<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPROMX — Cinématique</title>
  <meta name="description" content="Regarder cette cinématique sur l'univers iPROMX.">
  <link rel="icon" href="https://ik.imagekit.io/ipromx/images/logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/styles.css?v=50">
  <link rel="stylesheet" href="/player.css?v=50">
  <style>
    body { background: var(--void); color: var(--text); margin: 0; overflow-x: hidden; }

    .ep-back-btn {
      position: fixed; top: 18px; left: 20px; z-index: 9000;
      display: flex; align-items: center; gap: 8px;
      padding: 9px 18px;
      background: rgba(2,4,8,.82); border: 1px solid var(--edge); border-radius: var(--radius);
      color: var(--text-dim); font-family: var(--font-display); font-size: .58rem;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: var(--transition); text-decoration: none;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    .ep-back-btn:hover { border-color: var(--arc); color: var(--arc); transform: translateX(-2px); }

    /* Badge cinématique dans le player */
    .cine-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 4px;
      background: rgba(245,166,35,.15); border: 1px solid rgba(245,166,35,.35);
      font-family: var(--font-display); font-size: .5rem;
      font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--arc); margin-bottom: 10px;
    }

    /* Grid de cinématiques "Dans cette collection" */
    .cine-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .cine-grid-item {
      display: grid; grid-template-columns: 110px 1fr;
      gap: 12px; align-items: center;
      background: var(--panel2); border: 1px solid var(--edge2);
      border-radius: var(--radius); padding: 10px;
      cursor: pointer; transition: border-color .2s, background .2s;
    }
    .cine-grid-item:hover { border-color: var(--arc); background: var(--panel3); }
    .cine-grid-item.current {
      border-color: var(--arc);
      background: var(--arc-dim);
      cursor: default;
    }
    .cine-grid-thumb {
      width: 100%; height: 62px;
      background: #000 center/cover no-repeat;
      border-radius: calc(var(--radius) - 2px);
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .cine-grid-thumb-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.35); opacity: 0; transition: opacity .2s;
      font-size: .9rem; color: #fff;
    }
    .cine-grid-item:hover .cine-grid-thumb-overlay { opacity: 1; }
    .cine-grid-item.current .cine-grid-thumb-overlay { opacity: 1; background: rgba(245,166,35,.18); }
    .cine-grid-info { min-width: 0; }
    .cine-grid-num {
      font-family: var(--font-display); font-size: .48rem;
      letter-spacing: 2px; color: var(--arc); text-transform: uppercase; margin-bottom: 4px;
    }
    .cine-grid-title {
      font-family: var(--font-body); font-size: .82rem;
      color: var(--text); line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .ep-page { min-height: 100vh; }

    @media(max-width:1100px){
      .player-layout{grid-template-columns:1fr;padding:14px;}
      .player-sidebar{position:static;height:auto;}
      .sidebar-suggestions{max-height:none;}
    }
    @media(max-width:768px){
      .ep-back-btn{top:10px;left:10px;font-size:.5rem;padding:7px 12px;letter-spacing:1px;}
      .player-video-area{margin-top:0;}
      .player-layout{padding:10px 12px 48px;gap:14px;}
      .player-ep-title{font-size:1rem;}
      .player-series-name{font-size:.78rem;}
      .player-breadcrumb{font-size:.5rem;}
      .player-info-block{padding:10px 0 12px;}
      .player-actions-row{gap:8px;}
      .btn-ep-nav{padding:8px 12px;font-size:.56rem;}
      .btn-ep-nav span{display:none;}
      .player-season-tabs{gap:5px;}
      .suggestion-card{grid-template-columns:80px 1fr;}
      .suggestion-thumb{height:45px;}
      .upnext-thumb{height:130px;}
      .upnext-card{flex-direction:column;}
      .sidebar-section-title{font-size:.58rem;}
      .cine-grid-item{grid-template-columns:90px 1fr;}
      .cine-grid-thumb{height:52px;}
    }
    @media(max-width:480px){
      .ep-back-btn span{display:none;}
      .ep-back-btn{width:36px;height:36px;padding:0;justify-content:center;border-radius:50%;}
      .player-layout{padding:8px 10px 48px;}
      .player-actions-row{flex-direction:column;align-items:flex-start;}
      .player-nav-eps{width:100%;}
      .btn-ep-nav{flex:1;justify-content:center;}
      .btn-ep-nav span{display:inline;}
      .player-ep-title{font-size:.95rem;}
      .cine-grid-item{grid-template-columns:1fr;}
      .cine-grid-thumb{height:130px;}
    }
  </style>
</head>

<script>
'use strict';

// ── State ────────────────────────────────────────────────────────
let _idx = 0;
let _items = [];
let ytPlayer = null, autoTimer = null, autoCD = 0;
const AUTOPLAY_SEC = 10;

// ── URL helpers ──────────────────────────────────────────────────
function cineURL(idx) {
  const isLocal = ['localhost','127.0.0.1',''].includes(location.hostname) || location.protocol === 'file:';
  if (isLocal) return `/cinematic.html?idx=${idx}`;
  return `/cinematics/ep${idx}`;
}

function parsePath() {
  // Query-string mode (local dev)
  const p = new URLSearchParams(location.search);
  if (p.has('idx')) return { view: 'cinematic', idx: parseInt(p.get('idx')) || 0 };
  // Pretty URL mode: /cinematics/ep{n}
  const parts = location.pathname.replace(/^\//, '').split('/').filter(Boolean);
  if (parts[0] === 'cinematics' && parts[1]) {
    const n = parseInt(parts[1].replace('ep', ''));
    if (!isNaN(n)) return { view: 'cinematic', idx: n };
  }
  return { view: 'cinematic', idx: 0 };
}

// ── Video loaders ────────────────────────────────────────────────
function loadVideo(c) {
  const cont = document.getElementById('ytPlayerContainer');
  if (!cont) return;
  cont.innerHTML = '';

  if (c.sibnetUrl) {
    const iframe = document.createElement('iframe');
    iframe.src = c.sibnetUrl;
    iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
    iframe.allowFullscreen = true;
    iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-presentation');
    cont.appendChild(iframe);
    return;
  }

  if (c.videoId) {
    if (typeof YT !== 'undefined' && YT.Player) _createYTPlayer(c.videoId);
    else window._pendingYTVideoId = c.videoId;
  }
}

window.onYouTubeIframeAPIReady = function() {
  if (window._pendingYTVideoId) { _createYTPlayer(window._pendingYTVideoId); window._pendingYTVideoId = null; }
};

function _createYTPlayer(videoId) {
  const cont = document.getElementById('ytPlayerContainer'); if (!cont) return;
  cont.innerHTML = '<div id="ytDivInner"></div>';
  ytPlayer = new YT.Player('ytDivInner', {
    videoId,
    playerVars: { autoplay: 1, rel: 0, modestbranding: 1, iv_load_policy: 3 },
    events: {
      onReady(e) {
        e.target.playVideo();
        if (window._ytProgressInterval) clearInterval(window._ytProgressInterval);
        window._ytProgressInterval = setInterval(() => {
          try {
            if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
            const cur = ytPlayer.getCurrentTime(), dur = ytPlayer.getDuration();
            if (dur > 0 && window._currentCineMeta && typeof DB !== 'undefined') {
              const m = window._currentCineMeta;
              DB.saveProgress(m.fid, m.cid, m.season, m.epNum, (cur / dur) * 100, cur);
            }
          } catch {}
        }, 15000);
      },
      onStateChange(e) {
        if (e.data === YT.PlayerState.ENDED && window._autoTarget) startAutoplay();
      }
    }
  });
}

// ── Autoplay ─────────────────────────────────────────────────────
function startAutoplay() {
  if (!window._autoTarget) return;
  document.getElementById('autoplayBanner')?.classList.add('visible');
  autoCD = AUTOPLAY_SEC;
  const fill = document.getElementById('autoFill');
  autoTimer = setInterval(() => {
    autoCD--;
    const cd = document.getElementById('autoCD'); if (cd) cd.textContent = autoCD;
    if (fill) fill.style.width = `${(autoCD / AUTOPLAY_SEC) * 100}%`;
    if (autoCD <= 0) triggerAutoplay();
  }, 1000);
}

function cancelAutoplay() { clearInterval(autoTimer); autoTimer = null; document.getElementById('autoplayBanner')?.classList.remove('visible'); }
function triggerAutoplay() { const t = window._autoTarget; cancelAutoplay(); if (t != null) navigate(t); }
window.cancelAutoplay = cancelAutoplay;
window.triggerAutoplay = triggerAutoplay;

// ── Render ───────────────────────────────────────────────────────
function render(route) {
  _items = DATA.cinematics || [];
  _idx = route.idx;

  if (!_items.length || _idx < 0 || _idx >= _items.length) {
    location.href = '/'; return;
  }

  const c = _items[_idx];
  const thumb = c.image || (c.videoId ? `https://i.ytimg.com/vi/${c.videoId}/mqdefault.jpg` : 'https://ik.imagekit.io/ipromx/images/flash.jpg');

  document.title = `${c.title} — Cinématiques · iPROMX`;

  // Breadcrumb
  const bcTitle = document.getElementById('bcCineTitle');
  if (bcTitle) bcTitle.textContent = c.title;

  // Info
  document.getElementById('cineTitle').textContent = c.title;
  document.getElementById('cineMeta').innerHTML =
    `<span>Cinématique ${_idx + 1} / ${_items.length}</span><span class="dot"></span><span>FanTasTic RP · Pixelar</span>`;

  // Description
  const descEl = document.getElementById('cineDesc');
  if (descEl) {
    if (c.desc) { descEl.textContent = c.desc; descEl.style.display = ''; }
    else { descEl.style.display = 'none'; }
  }

  // Prev / Next
  const prevIdx = _idx > 0 ? _idx - 1 : null;
  const nextIdx = _idx < _items.length - 1 ? _idx + 1 : null;
  const btnP = document.getElementById('btnPrev'), btnN = document.getElementById('btnNext');
  if (btnP) { btnP.disabled = prevIdx === null; btnP.onclick = prevIdx !== null ? () => navigate(prevIdx) : null; }
  if (btnN) { btnN.disabled = nextIdx === null; btnN.onclick = nextIdx !== null ? () => navigate(nextIdx) : null; }

  // Upnext card
  const upnext = document.getElementById('upnextCard');
  if (upnext) {
    if (nextIdx !== null) {
      const nc = _items[nextIdx];
      const nt = nc.image || (nc.videoId ? `https://i.ytimg.com/vi/${nc.videoId}/mqdefault.jpg` : 'https://ik.imagekit.io/ipromx/images/flash.jpg');
      upnext.innerHTML = `<div class="upnext-card" onclick="navigate(${nextIdx})" style="cursor:pointer;">
        <div class="upnext-thumb lazy-bg" data-bg="${nt}"><div class="upnext-play-btn"><i class="fas fa-play"></i></div></div>
        <div class="upnext-info">
          <div class="upnext-label">Cinématique suivante</div>
          <div class="upnext-title">${nc.title}</div>
          <div class="upnext-ep">N°${nextIdx + 1} · Cinématiques</div>
        </div>
      </div>`;
    } else {
      upnext.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-muted);font-family:var(--font-display);font-size:.58rem;letter-spacing:2px;"><i class="fas fa-flag-checkered" style="font-size:1.5rem;display:block;margin-bottom:10px;opacity:.35;"></i>FIN DE LA COLLECTION</div>`;
    }
  }

  // Suggestions sidebar (voisins ±4)
  const sugg = document.getElementById('suggestList');
  if (sugg) {
    const start = Math.max(0, _idx - 2);
    const slice = _items.slice(start, _idx + 5);
    sugg.innerHTML = slice.map((o, si) => {
      const realIdx = start + si;
      const isCur = realIdx === _idx;
      const st = o.image || (o.videoId ? `https://i.ytimg.com/vi/${o.videoId}/mqdefault.jpg` : 'https://ik.imagekit.io/ipromx/images/flash.jpg');
      return `<div class="suggestion-card${isCur ? ' current' : ''}" ${!isCur ? `onclick="navigate(${realIdx})"` : 'style="cursor:default;"'}>
        <div class="suggestion-thumb lazy-bg" data-bg="${st}"></div>
        <div class="suggestion-info">
          <div class="suggestion-ep">${isCur ? 'EN COURS · ' : ''}N°${realIdx + 1}</div>
          <div class="suggestion-title">${o.title}</div>
        </div>
      </div>`;
    }).join('');
  }

  // Liste complète dans le main
  const listSec = document.getElementById('cineListSection');
  if (listSec) {
    listSec.innerHTML = `
      <div class="sidebar-section-title" style="margin:0 0 12px;">Toutes les cinématiques</div>
      <div class="cine-grid" id="cineFullGrid"></div>`;
    renderCineList();
  }

  // Autoplay setup
  document.getElementById('autoTitle').textContent = nextIdx !== null ? _items[nextIdx].title : '';
  document.getElementById('autoPlayBtn').style.display = nextIdx !== null ? '' : 'none';
  window._autoTarget = nextIdx;

  // Progress meta (pour DB)
  window._currentCineMeta = { fid: 'cinematic', cid: String(_idx), season: 'cinematic', epNum: _idx };

  // History
  if (typeof DB !== 'undefined') {
    DB.addHistory({ familyId: 'cinematic', charId: String(_idx), season: 'cinematic', epNum: _idx, title: c.title, videoId: c.videoId });
  }

  loadVideo(c);
  setupKeyboard(prevIdx, nextIdx);
  initLazyBg();
}

function renderCineList() {
  const grid = document.getElementById('cineFullGrid'); if (!grid) return;
  grid.innerHTML = _items.map((o, i) => {
    const isCur = i === _idx;
    const t = o.image || (o.videoId ? `https://i.ytimg.com/vi/${o.videoId}/mqdefault.jpg` : 'https://ik.imagekit.io/ipromx/images/flash.jpg');
    return `<div class="cine-grid-item${isCur ? ' current' : ''}" ${!isCur ? `onclick="navigate(${i})"` : ''}>
      <div class="cine-grid-thumb lazy-bg" data-bg="${t}">
        <div class="cine-grid-thumb-overlay">${isCur ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-play"></i>'}</div>
      </div>
      <div class="cine-grid-info">
        <div class="cine-grid-num">${isCur ? 'EN COURS · ' : ''}N° ${i + 1}</div>
        <div class="cine-grid-title">${o.title}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Navigate ─────────────────────────────────────────────────────
function navigate(idx) {
  cancelAutoplay();
  if (ytPlayer && typeof ytPlayer.destroy === 'function') { try { ytPlayer.destroy(); } catch {} ytPlayer = null; }
  if (window._ytProgressInterval) { clearInterval(window._ytProgressInterval); window._ytProgressInterval = null; }
  const url = cineURL(idx);
  history.pushState({}, ``, url);
  render({ view: 'cinematic', idx });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
window.navigate = navigate;

// ── Share ────────────────────────────────────────────────────────
function shareCinematic() {
  const c = _items[_idx];
  const text = c ? `${c.title} | iPROMX` : 'Cinématique iPROMX';
  if (navigator.share) navigator.share({ title: text, url: location.href }).catch(() => {});
  else navigator.clipboard?.writeText(location.href).then(() => toast('Lien copié !', 'success'));
}
window.shareCinematic = shareCinematic;

// ── Keyboard ──────────────────────────────────────────────────────
function setupKeyboard(prevIdx, nextIdx) {
  document.onkeydown = e => {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft' && prevIdx !== null) navigate(prevIdx);
    if (e.key === 'ArrowRight' && nextIdx !== null) navigate(nextIdx);
    if (e.key === 'Escape') cancelAutoplay();
    if (e.key === ' ' || e.key === 'k') {
      e.preventDefault();
      try { if (ytPlayer) { const s = ytPlayer.getPlayerState(); if (s === YT.PlayerState.PLAYING) ytPlayer.pauseVideo(); else ytPlayer.playVideo(); } } catch {}
    }
    if (e.key === 'f' || e.key === 'F') {
      try { const vc = document.getElementById('ytDivInner'); if (vc) { if (document.fullscreenElement) document.exitFullscreen(); else vc.requestFullscreen?.(); } } catch {}
    }
  };
}

// ── History / back ────────────────────────────────────────────────
window.addEventListener('popstate', () => {
  const route = parsePath();
  if (route.view === 'cinematic') render(route);
  else location.reload();
});

// ── Boot ──────────────────────────────────────────────────────────
appInit(() => {
  const route = parsePath();
  if (route.view !== 'cinematic') { location.href = '/'; return; }
  // Load YouTube IFrame API
  const yt = document.createElement('script');
  yt.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(yt);
  render(route);
});
</script>
</body>
