<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPROMX</title>
  <meta name="description" content="Découvrez les épisodes sur l'Univers iPROMX.">
  <link rel="icon" href="https://ik.imagekit.io/ipromx/images/logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/styles.css?v=34">
  <style>
    body { background: var(--void); color: var(--text); }
    .char-hero::before { content:""; position:absolute; top:0; left:0; right:0; height:80px; background:linear-gradient(to bottom, rgba(2,4,8,.7) 0%, transparent 100%); z-index:1; pointer-events:none; }
    .back-btn {
      position: fixed; top: 18px; left: 20px; z-index: 9000;
      display: flex; align-items: center; gap: 8px;
      padding: 9px 18px;
      background: rgba(2,4,8,.82); border: 1px solid var(--edge); border-radius: var(--radius);
      color: var(--text-dim); font-family: var(--font-display); font-size: .58rem;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: var(--transition); text-decoration: none;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .back-btn:hover { border-color: var(--arc); color: var(--arc); transform: translateX(-2px); }
    .user-btn {
      position: fixed; top: 18px; right: 20px; z-index: 9000;
      display: flex; align-items: center; gap: 8px;
      padding: 6px 6px 6px 14px;
      background: rgba(2,4,8,.82); border: 1px solid var(--edge); border-radius: 30px;
      color: var(--text-dim); font-family: var(--font-display); font-size: .58rem;
      font-weight: 700; letter-spacing: 1px;
      cursor: pointer; transition: var(--transition);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      text-decoration: none;
    }
    .user-btn:hover { border-color: var(--arc); }
    .user-btn-avatar {
      width: 30px; height: 30px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--arc); flex-shrink: 0;
    }
    .char-hero {
      position: relative; height: 58vh; min-height: 420px; max-height: 680px;
      background-size: cover; background-position: center 20%; overflow: hidden;
    }
    .char-hero::after {
      content: ''; position: absolute; inset: 0;
      background:
        linear-gradient(to right, rgba(2,4,8,.92) 0%, rgba(2,4,8,.45) 55%, rgba(2,4,8,.05) 100%),
        linear-gradient(to top, rgba(2,4,8,1) 0%, rgba(2,4,8,.5) 42%, transparent 100%);
    }
    .char-hero-content {
      position: absolute; bottom: 44px; left: 60px; right: 40%; z-index: 2;
    }
    .char-family-tag {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 5px 14px; background: rgba(245,166,35,.1); border: 1px solid rgba(245,166,35,.35);
      border-radius: 30px; font-family: var(--font-display); font-size: .58rem;
      font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--arc);
      margin-bottom: 14px;
    }
    .char-name {
      font-family: var(--font-display); font-size: clamp(1.8rem, 5vw, 3.8rem);
      font-weight: 900; color: white; letter-spacing: 2px;
      text-shadow: 0 2px 20px rgba(0,0,0,.8); margin-bottom: 12px; line-height: 1.05;
    }
    .char-desc {
      font-family: var(--font-body); font-size: clamp(.9rem, 1.4vw, 1.05rem);
      color: rgba(240,232,216,.72); line-height: 1.65; max-width: 480px; margin-bottom: 22px;
    }
    .char-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .char-prog { margin-top: 16px; max-width: 300px; }
    .char-prog-label { display: flex; justify-content: space-between; font-family: var(--font-display); font-size: .54rem; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 5px; }
    .char-prog-track { height: 3px; background: rgba(255,255,255,.1); border-radius: 2px; overflow: hidden; }
    .char-prog-fill { height: 100%; background: linear-gradient(90deg,var(--iron),var(--arc)); border-radius: 2px; transition: width .8s ease; }
    .char-body { max-width: 1280px; margin: 0 auto; padding: 0 40px 80px; }
    .char-layout { display: grid; grid-template-columns: 1fr 260px; gap: 36px; align-items: start; }
    .char-layout > * { min-width: 0; } /* empêche les enfants grille d'élargir le viewport */
    .char-hero-img { display: none; } /* bande image fixe mobile uniquement */
    .char-sidebar { position: sticky; top: 24px; }
    .side-card { background: var(--panel); border: 1px solid var(--edge2); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 14px; }
    .side-card-h { padding: 12px 16px; border-bottom: 1px solid var(--edge2); font-family: var(--font-display); font-size: .56rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--arc); display: flex; align-items: center; gap: 8px; }
    .side-card-h::before { content:''; width:3px; height:13px; background:linear-gradient(to bottom,var(--arc),var(--iron)); border-radius:2px; }
    .side-card-b { padding: 12px 16px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--edge2); font-family: var(--font-body); font-size: .86rem; }
    .stat-row:last-child { border-bottom: none; }
    .stat-lbl { color: var(--text-muted); }
    .stat-val { color: var(--arc); font-weight: 700; font-family: var(--font-display); font-size: .74rem; letter-spacing: 1px; }
    /* Continue watching strip */
    .continue-strip { margin: 28px 0 10px; padding: 16px 18px; background: linear-gradient(135deg,var(--panel),var(--panel2)); border: 1px solid var(--edge); border-radius: var(--radius-lg); display: flex; align-items: center; gap: 16px; cursor: pointer; transition: var(--transition); }
    .continue-strip:hover { border-color: var(--arc); transform: translateY(-2px); box-shadow: var(--shadow-arc); }
    .continue-thumb { width: 90px; height: 54px; border-radius: 5px; background-size: cover; background-position: center; background-color: var(--panel2); flex-shrink: 0; position: relative; overflow: hidden; }
    .continue-fill { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg,var(--iron),var(--arc)); }
    .continue-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.45); font-size: 1.2rem; color: white; opacity: 0; transition: opacity .2s; }
    .continue-strip:hover .continue-play { opacity: 1; }
    .continue-info { flex: 1; min-width: 0; }
    .continue-label { font-family: var(--font-display); font-size: .52rem; letter-spacing: 2px; color: var(--arc); margin-bottom: 3px; text-transform: uppercase; }
    .continue-title { font-family: var(--font-body); font-size: .95rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .continue-meta { font-family: var(--font-ui); font-size: .72rem; color: var(--text-muted); margin-top: 2px; }
    /* Season nav */
    .seas-nav { display: flex; align-items: center; gap: 8px; padding: 22px 0 16px; overflow-x: auto; scrollbar-width: none; }
    .seas-nav::-webkit-scrollbar { display: none; }
    .seas-tab { flex-shrink: 0; padding: 7px 18px; background: transparent; border: 1px solid var(--edge2); border-radius: 30px; color: var(--text-muted); font-family: var(--font-display); font-size: .58rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: var(--transition); }
    .seas-tab:hover { color: var(--text-dim); border-color: var(--edge); }
    .seas-tab.active { background: var(--arc-dim); border-color: rgba(245,166,35,.5); color: var(--arc); }
    /* Episodes grid */
    .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap: 14px; }
    .ep-card { background: var(--panel); border: 1px solid var(--edge2); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: border-color .2s, transform .2s, box-shadow .2s; text-decoration: none; display: block; position: relative; }
    .ep-card:hover { border-color: rgba(245,166,35,.35); transform: translateY(-3px); box-shadow: var(--shadow-arc); }
    .ep-card.watched { opacity: .72; } .ep-card.watched:hover { opacity: 1; }
    .ep-thumb { position: relative; width: 100%; padding-top: 56.25%; background-size: cover; background-position: center; background-color: var(--panel2); overflow: hidden; }
    .ep-thumb::after { content:''; position:absolute;inset:0;background:linear-gradient(to top,rgba(2,4,8,.65) 0%,transparent 55%); }
    .ep-play { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;background:rgba(231,76,60,.88);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;color:white;opacity:0;transition:opacity .2s;z-index:2;box-shadow:0 4px 18px var(--iron-glow); }
    .ep-card:hover .ep-play { opacity: 1; }
    .ep-num { position:absolute;bottom:8px;left:10px;font-family:var(--font-display);font-size:.54rem;font-weight:700;letter-spacing:2px;color:rgba(245,166,35,.9);z-index:2;text-shadow:0 1px 4px rgba(0,0,0,.8); }
    .ep-done { position:absolute;top:8px;right:8px;width:22px;height:22px;background:rgba(46,204,113,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:white;z-index:2; }
    .ep-new { position:absolute;top:8px;left:8px;padding:2px 7px;background:var(--iron);border-radius:3px;font-family:var(--font-display);font-size:.44rem;font-weight:700;letter-spacing:2px;color:white;z-index:2; }
    .ep-prog { position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,.3);z-index:2; }
    .ep-prog-f { height:100%;background:linear-gradient(90deg,var(--iron),var(--arc)); }
    .ep-info { padding: 12px 14px; }
    .ep-title { font-family:var(--font-body);font-size:.9rem;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden; }
    .ep-meta { font-family:var(--font-ui);font-size:.7rem;color:var(--text-muted); }
    .ep-stars { margin-top:5px;color:var(--arc);font-size:.7rem;letter-spacing:1px; }
    .skeleton { background:linear-gradient(90deg,var(--panel2) 25%,var(--panel3) 50%,var(--panel2) 75%);background-size:200% auto;animation:shimmer 1.4s linear infinite;border-radius:var(--radius); }
    @media(min-width:1600px){
      .char-hero{max-height:760px;}
      .char-hero-content{right:48%;}
      .char-desc{max-width:600px;}
    }
    @media(max-width:1100px){
      .char-layout{grid-template-columns:1fr;}
      .char-sidebar{position:static;}
    }
    @media(max-width:1100px) and (min-width:769px){
      .char-hero{min-height:460px;}
      .char-hero-content{left:40px;right:8%;bottom:36px;}
      .char-name{font-size:clamp(1.8rem,4.2vw,3rem);}
    }
    @media(max-width:768px){
      html, body { overflow-x: hidden; }
      .char-body { padding: 0 0 60px; }
      .char-layout { gap: 0; }
      .char-layout > * { min-width: 0; max-width: 100%; }

      /* ── HERO MOBILE ── */
      /* Le JS pose background-image en inline sur #charHero (desktop).
         Sur mobile on neutralise ce inline via JS (voir render()),
         et l'image passe dans #charHeroImg à hauteur FIXE.
         Zéro conflit CSS/inline possible. */
      .char-hero {
        height: auto !important;
        min-height: 0 !important;
        max-height: none !important;
        overflow: visible;
      }
      .char-hero::before { display: none; }
      .char-hero::after  { display: none; }

      .char-hero-img {
        display: block;
        width: 100%; height: 200px;
        background-size: cover;
        background-position: center 20%;
        position: relative; flex-shrink: 0;
      }
      .char-hero-img::after {
        content: ''; position: absolute; inset: 0;
        background:
          linear-gradient(to top,  rgba(2,4,8,1) 0%, rgba(2,4,8,.3) 55%, transparent 100%),
          linear-gradient(to bottom,rgba(2,4,8,.6) 0%, transparent 40%);
      }

      .char-hero-content {
        position: static;
        left: auto; right: auto; bottom: auto;
        width: 100%; max-width: 100%; box-sizing: border-box;
        padding: 16px 16px 24px;
        margin-top: 0;
        background: var(--void);
      }
      .char-family-tag { margin-bottom: 8px; }
      .char-name {
        font-size: clamp(1.3rem, 5.5vw, 2.1rem);
        letter-spacing: 1px; margin-bottom: 8px; line-height: 1.15;
      }
      .char-desc {
        font-size: .86rem; max-width: 100%; margin-bottom: 14px;
        display: block; overflow: visible;
        -webkit-line-clamp: unset; -webkit-box-orient: initial;
      }
      .char-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
      .char-actions .btn-primary,
      .char-actions .btn-secondary { padding: 10px 16px; font-size: .62rem; }
      .char-actions .btn-icon { width: 38px; height: 38px; }
      .char-actions .btn-icon i { font-size: .85rem; }
      .char-prog { margin-top: 12px; max-width: 100%; }

      /* ── CONTINUE WATCHING ── */
      .continue-strip {
        margin: 16px 12px 8px; padding: 10px 12px; gap: 10px;
        max-width: 100%; box-sizing: border-box;
      }
      .continue-thumb { width: 64px; height: 40px; flex-shrink: 0; }
      .continue-info  { flex: 1; min-width: 0; overflow: hidden; }
      .continue-title {
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        font-size: .86rem; max-width: 100%;
      }
      .continue-meta { font-size: .66rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      /* ── SAISONS ──
         On passe en flex-wrap, flex-shrink:1 et white-space:normal
         → les titres courts tiennent sur 1 ligne par rangée,
           les titres longs wrappent leur texte sur 2 lignes proprement
           sans jamais déborder hors du conteneur. */
      .seas-nav {
        display: flex; flex-wrap: wrap; overflow-x: visible;
        scrollbar-width: none; padding: 14px 12px 10px; gap: 6px;
        max-width: 100%; box-sizing: border-box;
      }
      .seas-tab {
        flex: 0 1 auto; min-width: 0;
        padding: 7px 12px; font-size: .54rem; letter-spacing: 1px;
        white-space: normal; word-break: break-word; line-height: 1.3;
        text-align: center;
      }

      /* ── ÉPISODES ── */
      .ep-grid { grid-template-columns: repeat(auto-fill,minmax(140px,1fr)); gap: 8px; padding: 0 12px; }
      .ep-info  { padding: 9px 11px; }
      .ep-title { font-size: .84rem; }
      .ep-meta  { font-size: .68rem; }

      .back-btn { top: 10px; left: 10px; padding: 7px 12px; font-size: .52rem; }
      .user-btn { top: 10px; right: 10px; }
    }
    @media(max-width:480px){
      .char-hero-img { height: 170px; }
      .char-name { font-size: clamp(1.1rem,5vw,1.6rem); }
      .char-desc { font-size: .82rem; }
      .seas-tab  { font-size: .5rem; padding: 6px 10px; }
      .ep-grid   { grid-template-columns: repeat(2,1fr); gap: 7px; }
      .ep-thumb  { padding-top: 60%; }
    }
    @media(max-width:360px){
      .char-name { font-size: 1rem; }
      .ep-grid   { grid-template-columns: 1fr 1fr; gap: 6px; }
    }
  </style>
</head>
<body>

<a class="back-btn" href="/" id="backBtn"><i class="fas fa-arrow-left"></i> Retour</a>
<div class="user-btn" id="userBtnFixed" onclick="openUserMenu()"></div>
<div id="userMenuFloat" style="position:fixed;top:60px;right:20px;z-index:9001;display:none;"></div>

<div style="height:56px;background:var(--void);"></div>
<div id="charHero" class="char-hero">
  <div id="charHeroImg" class="char-hero-img"></div>
  <div class="char-hero-content" id="charHeroContent">
    <div class="skeleton" style="width:120px;height:22px;margin-bottom:14px;border-radius:30px;"></div>
    <div class="skeleton" style="width:280px;height:48px;margin-bottom:12px;"></div>
    <div class="skeleton" style="width:360px;height:50px;margin-bottom:18px;"></div>
    <div class="skeleton" style="width:200px;height:44px;border-radius:6px;"></div>
  </div>
</div>

<div class="char-body">
  <div style="padding:14px 0 0;font-family:var(--font-display);font-size:.54rem;letter-spacing:2px;color:var(--text-muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <a href="/" style="color:rgba(245,166,35,.7);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:5px;" onmouseover="this.style.color='var(--arc)'" onmouseout="this.style.color='rgba(245,166,35,.7)'"><i class="fas fa-home"></i> Accueil</a>
    <span>›</span><span id="breadFam"></span><span>›</span><span id="breadChar"></span>
  </div>
  <div class="char-layout" style="padding-top:4px;">
    <div id="charMain">
      <div id="continueWatching"></div>
      <nav class="seas-nav" id="seasNav"></nav>
      <div class="ep-grid" id="epGrid"></div>
    </div>
    <aside class="char-sidebar" id="charSidebar"></aside>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/data.js?v=41"></script>
<script src="/app.js?v=41"></script>

','--iron-glow':'rgba(234,88,12,0.45)','--edge':'rgba(251,146,60,0.22)','--edge2':'rgba(251,146,60,0.08)','--text':'#fff1e6'},'neon':{'--arc':'#e879f9','--iron':'#a21caf','--iron-bright':'#d946ef','--void':'#060108','--panel':'#100614','--panel2':'#180a1e','--panel3':'#200d28','--arc-dim':'rgba(232,121,249,0.12)','--arc-glow':'rgba(232,121,249,0.45)','--iron-glow':'rgba(217,70,239,0.45)','--edge':'rgba(232,121,249,0.22)','--edge2':'rgba(232,121,249,0.08)','--text':'#fce7ff'},'gold':{'--arc':'#fbbf24','--iron':'#92400e','--iron-bright':'#d97706','--void':'#060400','--panel':'#130e00','--panel2':'#1c1500','--panel3':'#261d00','--arc-dim':'rgba(251,191,36,0.12)','--arc-glow':'rgba(251,191,36,0.45)','--iron-glow':'rgba(217,119,6,0.45)','--edge':'rgba(251,191,36,0.22)','--edge2':'rgba(251,191,36,0.08)','--text':'#fffbeb'},'ice':{'--arc':'#a5f3fc','--iron':'#164e63','--iron-bright':'#06b6d4','--void':'#020608','--panel':'#060e12','--panel2':'#0a161c','--panel3':'#0e1e26','--arc-dim':'rgba(165,243,252,0.12)','--arc-glow':'rgba(165,243,252,0.45)','--iron-glow':'rgba(6,182,212,0.4)','--edge':'rgba(165,243,252,0.2)','--edge2':'rgba(165,243,252,0.07)','--text':'#ecfeff'},'smoke':{'--arc':'#94a3b8','--iron':'#475569','--iron-bright':'#64748b','--void':'#050507','--panel':'#0e0e12','--panel2':'#141418','--panel3':'#1a1a1e','--arc-dim':'rgba(148,163,184,0.12)','--arc-glow':'rgba(148,163,184,0.35)','--iron-glow':'rgba(100,116,139,0.4)','--edge':'rgba(148,163,184,0.18)','--edge2':'rgba(148,163,184,0.07)','--text':'#e2e8f0'}};
  const theme=T[t]||T.iron;
  Object.entries(theme).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
})();

// Scroll to top automatique à l'arrivée sur la page
window.scrollTo({ top: 0, behavior: 'instant' });

const RK = () => `ipx_ratings_${(typeof AUTH!=='undefined'&&AUTH?.getCurrentUser?.()?.uid)||'g'}`;
const getRating = (fid,cid,s,n) => { try{return JSON.parse(localStorage.getItem(RK())||'{}')[`${fid}__${cid}__${s}__${n}`]||0;}catch{return 0;} };

let _fid, _cid, _curSeason;

function parsePath(){
  const p=new URLSearchParams(location.search);
  if(p.get('fid')&&p.get('cid')) return{view:'character',fid:p.get('fid'),cid:p.get('cid')};
  return SLUG.parse(location.pathname);
}

function render(route){
  _fid=route.fid; _cid=route.cid;
  const char=getChar(_fid,_cid), u=DATA.universes[_fid];
  if(!char||!u){location.href='/';return;}

  document.title=char.name;
  document.querySelector('meta[name=description]').content=(char.description||'').slice(0,160);

  const hero    = document.getElementById('charHero');
  const heroImg = document.getElementById('charHeroImg');
  const heroBg  = `url('${char.banner||u.banner||char.image}')`;
  // Desktop : background sur .char-hero (absolu, overlay gradient)
  // Mobile  : background neutralisé sur .char-hero, posé sur #charHeroImg (200px fixe)
  if(window.innerWidth <= 768){
    hero.style.backgroundImage = 'none';
    if(heroImg) heroImg.style.backgroundImage = heroBg;
  } else {
    hero.style.backgroundImage = heroBg;
  }

  const prog=(typeof getOverallProgress==='function')?getOverallProgress(_fid,_cid):0;
  const totalEps=getTotalEps(char);
  const inList=(typeof DB!=='undefined')?DB.isInList(_fid,_cid):false;
  const firstEp=getFirstEp(char);

  document.getElementById('charHeroContent').innerHTML=`
    <div class="char-family-tag"><i class="fas fa-users"></i> ${u.name}</div>
    <h1 class="char-name">${char.name}</h1>
    <p class="char-desc">${char.description||''}</p>
    <div class="char-actions">
      ${firstEp?`<a href="${SLUG.epURL(_fid,_cid,firstEp.season,firstEp.ep.num)}" class="btn-primary" style="text-decoration:none;"><i class="fas fa-play"></i> Regarder</a>`:''}
      ${char.hasLawBook?`<button class="btn-secondary" onclick="openLawBook()" style="background:rgba(155,89,182,.15);border-color:rgba(155,89,182,.5);"><i class="fas fa-book"></i> Lois des Shades</button>`:''}
      <button class="btn-icon${inList?' active':''}" id="listBtn" onclick="handleList()" title="${inList?'Retirer de ma liste':'Ajouter à ma liste'}"><i class="fas fa-${inList?'check':'plus'}"></i></button>
      <button class="btn-icon" onclick="shareChar()" title="Partager"><i class="fas fa-share-alt"></i></button>
    </div>
    ${prog>0?`<div class="char-prog"><div class="char-prog-label"><span>Progression</span><span>${prog}%</span></div><div class="char-prog-track"><div class="char-prog-fill" style="width:${prog}%"></div></div></div>`:''}`;

  document.getElementById('breadFam').textContent=u.name;
  document.getElementById('breadChar').textContent=char.name;

  renderUserBtn();
  renderSidebar(char,u,prog,totalEps);
  renderContinueWatching(char);

  const seasons=Object.keys(char.seasons||{});
  _curSeason=seasons[0]||null;
  document.getElementById('seasNav').innerHTML=seasons.map(s=>
    `<button class="seas-tab${s===_curSeason?' active':''}" onclick="selSeason('${s.replace(/'/g,"\\'")}',this)">${s}</button>`
  ).join('');
  renderEps(_fid,_cid,_curSeason);
  initLazyBg();
}

function renderUserBtn(){
  const user=typeof AUTH!=='undefined'?AUTH.getCurrentUser():null;
  const isGuest=typeof AUTH!=='undefined'?AUTH.isGuest():false;
  const btn=document.getElementById('userBtnFixed');
  if(!btn)return;
  if(!user&&!isGuest){btn.style.display='none';return;}
  const avSrc=user?.avatarId&&typeof PRESET_AVATARS!=='undefined'?PRESET_AVATARS?.find(a=>a.id===user.avatarId)?.src:null;
  const initials=(user?.username||'G').slice(0,2).toUpperCase();
  btn.innerHTML=`<span style="font-family:var(--font-display);font-size:.56rem;letter-spacing:1px;color:var(--text-muted);">${user?.username||'Invité'}</span>
    ${avSrc?`<img src="${avSrc}" class="user-btn-avatar">`:`<div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--iron),var(--arc));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:.65rem;font-weight:700;color:white;">${initials}</div>`}`;
}

function openUserMenu(){
  const float=document.getElementById('userMenuFloat');
  if(!float)return;
  if(float.style.display!=='none'){float.style.display='none';return;}
  const user=typeof AUTH!=='undefined'?AUTH.getCurrentUser():null;
  const isGuest=typeof AUTH!=='undefined'?AUTH.isGuest():false;
  float.innerHTML=`<div style="background:var(--panel);border:1px solid var(--edge);border-radius:var(--radius-lg);overflow:hidden;min-width:190px;box-shadow:var(--shadow-arc);animation:fadeInUp .18s ease;">
    <div style="padding:12px 16px;border-bottom:1px solid var(--edge2);">
      <div style="font-family:var(--font-display);font-size:.7rem;font-weight:700;color:var(--text);">${user?.username||'Invité'}</div>
      ${user?.email?`<div style="font-family:var(--font-ui);font-size:.7rem;color:var(--text-muted);margin-top:2px;">${user.email}</div>`:''}
    </div>
    <button class="dd-item" onclick="location.href='/'"><i class="fas fa-home"></i> Accueil</button>
    ${!isGuest?`<button class="dd-item" onclick="float.style.display='none';" disabled><i class="fas fa-cog"></i> Paramètres (accueil)</button>`:''}
    <button class="dd-item danger" onclick="${isGuest
      ? "AUTH.logout?.().then(()=>location.href='/')"
      : "AUTH.logout?.().then(()=>location.href='/')"}">
      <i class="fas fa-sign-out-alt"></i> ${isGuest?'Quitter':'Déconnexion'}
    </button>
  </div>`;
  float.style.display='block';
  setTimeout(()=>document.addEventListener('click',()=>{float.style.display='none';},{once:true}),0);
}
window.openUserMenu=openUserMenu;

function renderContinueWatching(char){
  const cw=document.getElementById('continueWatching');if(!cw)return;
  if(typeof DB==='undefined'){cw.innerHTML='';return;}
  const hist=DB.getHistory().filter(h=>h.familyId===_fid&&h.charId===_cid);
  if(!hist.length){cw.innerHTML='';return;}
  const h=hist[0];
  const prog=DB.getProgress(h.familyId,h.charId,h.season,h.epNum).pct||0;
  const url=SLUG.epURL(h.familyId,h.charId,h.season,h.epNum);
  const thumb=h.videoId?`https://i.ytimg.com/vi/${h.videoId}/mqdefault.jpg`:'https://ik.imagekit.io/ipromx/images/flash.jpg';
  cw.innerHTML=`<div class="continue-strip" onclick="location.href='${url}'">
    <div class="continue-thumb lazy-bg" data-bg="${thumb}">
      <div class="continue-play"><i class="fas fa-play"></i></div>
      ${prog>0?`<div class="continue-fill" style="width:${prog}%"></div>`:''}
    </div>
    <div class="continue-info">
      <div class="continue-label"><i class="fas fa-history"></i> Continuer</div>
      <div class="continue-title">${h.title||'Épisode '+h.epNum}</div>
      <div class="continue-meta">${h.season} · Épisode ${h.epNum}${prog>0?' · '+Math.round(prog)+'%':''}</div>
    </div>
    <i class="fas fa-chevron-right" style="color:var(--arc);opacity:.6;font-size:1.1rem;flex-shrink:0;"></i>
  </div>`;
}

function renderSidebar(char,u,prog,totalEps){
  const seasons=Object.keys(char.seasons||{});
  const siblings=u.characters.filter(c=>c.id!==_cid&&getTotalEps({seasons:c.seasons||{},hasLocalVideo:c.hasLocalVideo,hasLawBook:c.hasLawBook})>0).slice(0,5);
  document.getElementById('charSidebar').innerHTML=`
    <div class="side-card">
      <div class="side-card-h">Infos</div>
      <div class="side-card-b">
        <div class="stat-row"><span class="stat-lbl">Famille</span><span class="stat-val">${u.name}</span></div>
        <div class="stat-row"><span class="stat-lbl">Saisons</span><span class="stat-val">${seasons.length}</span></div>
        <div class="stat-row"><span class="stat-lbl">Épisodes</span><span class="stat-val">${totalEps}</span></div>
        ${prog>0?`<div class="stat-row"><span class="stat-lbl">Progression</span><span class="stat-val">${prog}%</span></div>`:''}
      </div>
    </div>
    ${siblings.length?`<div class="side-card">
      <div class="side-card-h">${u.name}</div>
      <div class="side-card-b" style="display:flex;flex-direction:column;gap:0;">
        ${siblings.map(c=>`<a href="${SLUG.charURL(_fid,c.id)}" style="display:flex;align-items:center;gap:10px;text-decoration:none;padding:8px 0;border-bottom:1px solid var(--edge2);">
          <div style="width:32px;height:32px;border-radius:50%;background-size:cover;background-position:center;background-image:url('${c.image}');border:1px solid var(--edge);flex-shrink:0;"></div>
          <span style="font-family:var(--font-body);font-size:.86rem;font-weight:600;color:var(--text-dim);transition:color .2s;" onmouseover="this.style.color='var(--arc)'" onmouseout="this.style.color='var(--text-dim)'">${c.name}</span>
        </a>`).join('')}
      </div>
    </div>`:''}`;
}

function selSeason(s,btn){
  _curSeason=s;
  document.querySelectorAll('.seas-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderEps(_fid,_cid,s);
}
window.selSeason=selSeason;

function renderEps(fid,cid,season){
  const char=getChar(fid,cid);
  const eps=char?.seasons?.[season]||[];
  const grid=document.getElementById('epGrid');if(!grid)return;
  if(!eps.length){
    grid.innerHTML=`<div style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:56px 20px;gap:12px;color:var(--text-muted);">
      <i class="fas fa-clock" style="font-size:2rem;opacity:.3;"></i>
      <h4 style="font-family:var(--font-display);font-size:.76rem;letter-spacing:3px;color:var(--text-dim);">BIENTÔT DISPONIBLE</h4>
    </div>`;return;
  }
  grid.innerHTML=eps.map(ep=>{
    const prog=typeof DB!=='undefined'?DB.getProgress(fid,cid,season,ep.num).pct:0;
    const done=prog>=90;
    const stars=getRating(fid,cid,season,ep.num);
    const isNew=ep.addedAt&&(Date.now()-new Date(ep.addedAt).getTime())<14*86400000;
    const url=SLUG.epURL(fid,cid,season,ep.num);
    const thumb=ep.thumb||(ep.videoId?`https://i.ytimg.com/vi/${ep.videoId}/mqdefault.jpg`:'https://ik.imagekit.io/ipromx/images/flash.jpg');
    return `<a class="ep-card${done?' watched':''}" href="${url}">
      <div class="ep-thumb lazy-bg" data-bg="${thumb}">
        <div class="ep-play"><i class="fas fa-play"></i></div>
        <div class="ep-num">ÉP. ${ep.num}</div>
        ${done?'<div class="ep-done"><i class="fas fa-check"></i></div>':''}
        ${isNew&&!done?'<div class="ep-new">NOUVEAU</div>':''}
        ${ep.youtubeLink?'<div style="position:absolute;bottom:7px;right:7px;background:rgba(255,0,0,.85);color:white;font-family:var(--font-display);font-size:.44rem;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;z-index:2;"><i class=\'fab fa-youtube\'></i> YT</div>':''}
        ${prog>0&&!done?`<div class="ep-prog"><div class="ep-prog-f" style="width:${prog}%"></div></div>`:''}
      </div>
      <div class="ep-info">
        <div class="ep-title">${ep.title}</div>
        <div class="ep-meta">${season} · Épisode ${ep.num}</div>
        ${stars>0?`<div class="ep-stars">${'★'.repeat(stars)}${'☆'.repeat(5-stars)}</div>`:''}
      </div>
    </a>`;
  }).join('');
  initLazyBg();
}

function handleList(){
  const inList=typeof DB!=='undefined'?DB.isInList(_fid,_cid):false;
  const btn=document.getElementById('listBtn');
  if(inList){DB.removeFromList(_fid,_cid);if(btn){btn.innerHTML='<i class="fas fa-plus"></i>';btn.classList.remove('active');}toast('Retiré de votre liste.','info');}
  else{DB.addToList({familyId:_fid,charId:_cid,name:getChar(_fid,_cid)?.name});if(btn){btn.innerHTML='<i class="fas fa-check"></i>';btn.classList.add('active');}toast('Ajouté à votre liste !','success');}
}
window.handleList=handleList;

function shareChar(){
  const char=getChar(_fid,_cid);
  if(navigator.share)navigator.share({title:`${char?.name} — iPROMX`,url:location.href}).catch(()=>{});
  else navigator.clipboard?.writeText(location.href).then(()=>toast('Lien copié !','success'));
}
window.shareChar=shareChar;

appInit(()=>{
  const route=parsePath();
  if(route.view!=='character'&&route.view!=='episode'){location.href='/';return;}
  render(route);
});

// ── LAW BOOK ─────────────────────────────────────────────────────────────────
let _lawImgs=[], _lawPage=0;
function openLawBook(){
  const char=getChar(_fid,_cid); if(!char?.lawBookImages?.length) return;
  _lawImgs=char.lawBookImages; _lawPage=0; _updateLaw();
  document.getElementById('charLawsModal')?.classList.add('open');
}
function closeLawBook(){ document.getElementById('charLawsModal')?.classList.remove('open'); }
function _updateLaw(){
  const img=$('charLawBookImg'), pi=$('charLawPageInd'), pv=$('charLawPrev'), nx=$('charLawNext');
  if(img) img.src=_lawImgs[_lawPage];
  if(pi)  pi.textContent=`${_lawPage+1} / ${_lawImgs.length}`;
  if(pv)  pv.disabled=!_lawPage;
  if(nx)  nx.disabled=_lawPage===_lawImgs.length-1;
}
function lawCharPrev(){ if(_lawPage>0){_lawPage--;_updateLaw();} }
function lawCharNext(){ if(_lawPage<_lawImgs.length-1){_lawPage++;_updateLaw();} }
window.openLawBook=openLawBook; window.closeLawBook=closeLawBook;
window.lawCharPrev=lawCharPrev; window.lawCharNext=lawCharNext;
</script>

  .laws-book{position:relative;max-width:92vw;max-height:90vh;background:#0a0a0a;border:1px solid var(--edge);border-radius:var(--radius-lg);overflow:hidden;}
  .laws-close{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.6);border:none;color:white;cursor:pointer;z-index:2;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .laws-controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:10px;background:rgba(0,0,0,.7);}
  .laws-nav-btn{background:var(--panel);border:1px solid var(--edge);color:var(--text);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem;}
  .laws-nav-btn:disabled{opacity:.3;cursor:default;}
  .laws-page-indicator{font-family:var(--font-display);font-size:.6rem;letter-spacing:2px;color:var(--arc);}
</style>
<div class="laws-modal" id="charLawsModal" onclick="if(event.target===this)closeLawBook()">
  <div class="laws-book">
    <button class="laws-close" onclick="closeLawBook()"><i class="fas fa-times"></i></button>

    <div class="laws-controls">
      <button class="laws-nav-btn" id="charLawPrev" onclick="lawCharPrev()"><i class="fas fa-chevron-left"></i></button>
