[build]
  functions = "netlify/functions"
  publish   = "."

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

[[scheduled.functions]]
  name     = "keepalive"
  schedule = "0 0 */2 * *"

# SPA Routing — URLs réelles pour les personnages et épisodes
[[redirects]]
  from   = "/:fam/:char/:season/:ep"
  to     = "/episode.html"
  status = 200

[[redirects]]
  from   = "/:fam/:char"
  to     = "/character.html"
  status = 200

[[redirects]]
  from   = "/:fam/:char/"
  to     = "/character.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control  = "public, max-age=0, must-revalidate"
    X-Robots-Tag   = "index, follow"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Robots-Tag  = "index, follow"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.netlify/functions/firebase-config"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=600"

[[headers]]
  for = "/.netlify/functions/live-on-twitch"
  [headers.values]
    Cache-Control = "public, max-age=90, stale-while-revalidate=30"

[[headers]]
  for = "/.netlify/functions/ia"
  [headers.values]
    Cache-Control = "no-cache, no-store"