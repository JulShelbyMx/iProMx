<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecteur VK Video</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0f0f0f;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            max-width: 1280px;
            margin: 30px auto;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <h1>Lecteur VK Video</h1>
    
    <div class="video-wrapper">
        <iframe 
            src="https://vk.com/video_ext.php?oid=-232188821&id=456239027" 
            width="1280" 
            height="720" 
            allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" 
            frameborder="0" 
            allowfullscreen>
        </iframe>
    </div>

    <p>Si tu vois encore le chien, utilise le code "Exporter" directement depuis VK.</p>
</body>
</html>
